<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <title>old helps HTML综合示例</title>
    </head>
    <body>
        <!--表格-->
		<h4 align="center">表格</h4>
        <table border="2" align="center">
			<tr>
				<th>项目1</th>
				<th>项目2</th>
				<th>项目3</th>
			</tr>
			<tr>
				<td>内容1</td>
				<td>内容2</td>
				<td>内容3</td>
			</tr>
		</table>
		<h4 align="center">表单</h4>
		<form action="#" align="center">
			<label>用户名:</label><input type="text" /><br>
			<label>密码：</label><input type="password"  /><br>
			<label>文本域：</label>
			<textarea rows="10" cols="10"></textarea><br>
			checkbox:<input type="checkbox" /><br>
			radio:<input type="radio" /><br>
			<input type="submit"  align="center"  value="登录"/>
		</form>
		<br><h4>readonly</h4>
		readonly:<textarea rows="10" cols="10">
			this is some text.this is some text.this is some text.this is some text.this is some text.this is some text.
		</textarea>
    </body>
</html>
